<!DOCTYPE html>
<html>

<head>

<title>HRTechify Team Simulator</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>HRTechify Team Simulator</h1>

<div id="landingPage" class="card">

<h2>Participant Information</h2>

<input
id="name"
placeholder="Enter First Name">

<select
id="jobFunction"
onchange="populateFamilies()">

<option value="">
Select Job Function
</option>

</select>

<select id="jobFamily">

<option value="">
Select Job Family
</option>

</select>

<button
class="primary"
onclick="startSimulation()">

Begin Assessment

</button>

</div>

<div
id="simulation"
class="card hidden">

<h2 id="questionTitle"></h2>

<p id="questionText"></p>

<div id="options"></div>

<button onclick="previousQuestion()">
Back
</button>

<button
class="primary"
onclick="nextQuestion()">

Next

</button>

</div>

</div>

<script src="data/job-functions.js"></script>
<script src="js/app.js"></script>

</body>

</html>
