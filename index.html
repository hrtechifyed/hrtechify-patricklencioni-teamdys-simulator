HRTechify Team Simulator

<input
id="organization"

class="border p-3 rounded">

</div>

<div class="mt-6">

<label class="font-semibold">
Job Function
</label>

class="border p-3 rounded w-full mt-2"
onchange="populateFamilies()">

<option value="">Select Job Function</option>

</select>
<div class="mt-6">

<label class="font-semibold">
Job Family
</label>

<select
id="jobFamily"
class="border p-3 rounded w-full mt-2">

<option value="">
Select Job Family
</option>

</select>

</div>
  
</div>

<button
onclick="startSimulation()"
class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg mt-6">

Begin Assessment

</button>

</div>

<div
id="simulation"
class="hidden hero-card p-8 mt-8">

<div class="mb-4">

<div class="w-full bg-gray-200 rounded-full h-4">

<div
id="progressBar"
class="bg-blue-600 h-4 rounded-full"
style="width:0%">
</div>

</div>

</div>

<h2
id="questionTitle"
class="text-3xl font-bold mb-4">
</h2>

<p
id="questionText"
class="text-lg mb-6">
</p>

<div class="grid gap-3">

<button
onclick="answer('positive')"
class="bg-green-600 text-white p-3 rounded">

Positive Team Behaviour

</button>

<button
onclick="answer('neutral')"
class="bg-yellow-500 text-white p-3 rounded">

Neutral Team Behaviour

</button>

<button
onclick="answer('negative')"
class="bg-red-600 text-white p-3 rounded">

Negative Team Behaviour

</button>

</div>

</div>

</div>

<footer
class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-3 text-center">

HRTechify Team Simulator |
Question <span id="tracker">0</span>/15

</footer>

let currentQuestion = 0;

function assignArc(){

let lastArc =
localStorage.getItem("lastArc");

let currentArc;

if(!lastArc){

currentArc =
Math.random() < 0.5
? "ArcA"
: "ArcB";

}
else{

currentArc =
lastArc === "ArcA"
? "ArcB"
: "ArcA";

}

localStorage.setItem(
"lastArc",
currentArc
);

return currentArc;

}

function populateFamilies(){

const functionName =
document.getElementById("jobFunction").value;

const familyDropdown =
document.getElementById("jobFamily");

familyDropdown.innerHTML =
'<option value="">Select Job Family</option>';

if(!functionName) return;

jobFunctions[functionName].forEach(family => {

const option =
document.createElement("option");

option.value = family;

option.textContent = family;

familyDropdown.appendChild(option);

});

} 
window.onload = function(){

const functionDropdown =
document.getElementById("jobFunction");

Object.keys(jobFunctions).forEach(jobFunction => {

const option =
document.createElement("option");

option.value = jobFunction;

option.textContent = jobFunction;

functionDropdown.appendChild(option);

});

};  
const images = [

"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1200",

"https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=1200"

];

let imageIndex = 0;

setInterval(() => {

imageIndex++;

if(imageIndex >= images.length){

imageIndex = 0;

}

document.getElementById("carousel").src =
images[imageIndex];

},3000);

const questions = [

"Trust: A team member admits a major mistake that has impacted the project timeline. How does the team respond?",

"Conflict: Two senior members disagree strongly on priorities. What happens next?",

"Trust: A stakeholder questions the team's capability. How does the team react?",

"Commitment: A difficult decision must be made before tomorrow. What happens?",

"Conflict: Tension rises during planning discussions. How is it handled?",

"Accountability: A key deliverable is missed. What happens next?",

"Trust: A team member asks for help publicly. How does the team respond?",

"Commitment: Leadership wants a final decision. What happens?",

"Results: Performance metrics are declining. What becomes the priority?",

"Conflict: Resource allocation becomes a major issue. What happens?",

"Accountability: One member repeatedly misses expectations. What happens?",

"Results: Team goals and personal goals begin to diverge. What happens?",

"Trust: Feedback is requested from peers. How is it received?",

"Commitment: An unpopular but necessary change is proposed. What happens?",

"Results: Final project outcomes are reviewed. What matters most?"

];

function startSimulation(){

const assignedArc =
assignArc();

console.log(
"Assigned Arc:",
assignedArc
);

currentQuestion = 0;

document
.getElementById("simulation")
.classList
.remove("hidden");

loadQuestion();

}

function loadQuestion(){

document
.getElementById("questionTitle")
.innerText =
"Question " + (currentQuestion + 1);

document
.getElementById("questionText")
.innerText =
questions[currentQuestion];

document
.getElementById("tracker")
.innerText =
currentQuestion + 1;

document
.getElementById("progressBar")
.style.width =
((currentQuestion + 1) / 15 * 100) + "%";

}

function answer(type){

currentQuestion++;

if(currentQuestion >= questions.length){

alert(
"Assessment Completed."
);

return;

}

loadQuestion();

}
