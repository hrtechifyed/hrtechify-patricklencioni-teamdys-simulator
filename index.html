<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HRTechify Team Simulator</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="data/job-functions.js"></script>

<style>

body{
background:#f8fafc;
}

.hero-card{
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.carousel-image{
height:280px;
object-fit:cover;
width:100%;
border-radius:16px;
}

</style>

</head>

<body>

<div class="max-w-6xl mx-auto p-6">

<div class="text-center mb-8">

<h1 class="text-5xl font-bold text-slate-800">
HRTechify Team Simulator
</h1>

<p class="text-slate-600 mt-3">
Patrick Lencioni Framework Leadership & Team Effectiveness Assessment
</p>

</div>

<div class="hero-card p-4 mb-8">

<img
id="carousel"
class="carousel-image"
src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"

>

</div>

<div class="hero-card p-8">

<h2 class="text-2xl font-bold mb-6">
Participant Information
</h2>

<div class="grid md:grid-cols-2 gap-4">

<input
id="name"
placeholder="Full Name"
class="border p-3 rounded">

<input
id="email"
placeholder="Email"
class="border p-3 rounded">

<input
id="designation"
placeholder="Designation"
class="border p-3 rounded">

<input
id="organization"
placeholder="Organization"
class="border p-3 rounded">

</div>

<div class="mt-6">

<label class="font-semibold">
Job Function
</label>

<select
id="jobFunction"
class="border p-3 rounded w-full mt-2">

<option>Human Resources</option>
<option>Information Technology</option>
<option>Sales</option>
<option>Finance & Accounting</option>

</select>

</div>


<button
onclick="startSimulation()"
class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg mt-6">

Begin Assessment

</button>

</div>

<div
id="simulation"
class="hidden hero-card p-8 mt-8">

<div class="mb-4">

<div class="w-full bg-gray-200 rounded-full h-4">

<div
id="progressBar"
class="bg-blue-600 h-4 rounded-full"
style="width:0%">
</div>

</div>

</div>

<h2
id="questionTitle"
class="text-3xl font-bold mb-4">

</h2>

<p
id="questionText"
class="text-lg mb-6">

</p>

<div class="grid gap-3">

<button
onclick="answer('positive')"
class="bg-green-600 text-white p-3 rounded">

Positive Team Behaviour

</button>

<button
onclick="answer('neutral')"
class="bg-yellow-500 text-white p-3 rounded">

Neutral Team Behaviour

</button>

<button
onclick="answer('negative')"
class="bg-red-600 text-white p-3 rounded">

Negative Team Behaviour

</button>

</div>

</div>

</div>

<footer
class="fixed bottom-0 left-0 right-0 bg-slate-900 text-white p-3 text-center">

HRTechify Team Simulator |
Question <span id="tracker">
0 </span>
/15

</footer>

<script>

<script>

let currentQuestion=0;

function assignArc(){

let lastArc =
localStorage.getItem("lastArc");

let currentArc;

if(!lastArc){

currentArc =
Math.random() < 0.5
? "ArcA"
: "ArcB";

}
else{

currentArc =
lastArc === "ArcA"
? "ArcB"
: "ArcA";

}

localStorage.setItem(
"lastArc",
currentArc
);

return currentArc;

}

const images=[

"https://images.unsplash.com/photo-1522202176988-66273c2fd55f",

"https://images.unsplash.com/photo-1516321318423-f06f85e504b3",

"https://images.unsplash.com/photo-1552664730-d307ca884978",

"https://images.unsplash.com/photo-1521737604893-d14cc237f11d"

];

let imageIndex=0;

setInterval(()=>{

imageIndex++;

if(imageIndex>=images.length){

imageIndex=0;

}

document.getElementById("carousel").src=
images[imageIndex];

},3000);

const questions=[

"Trust: A team member admits a major mistake that has impacted the project timeline. How does the team respond?",

"Conflict: Two senior members disagree strongly on priorities. What happens next?",

"Trust: A stakeholder questions the team's capability. How does the team react?",

"Commitment: A difficult decision must be made before tomorrow. What happens?",

"Conflict: Tension rises during planning discussions. How is it handled?",

"Accountability: A key deliverable is missed. What happens next?",

"Trust: A team member asks for help publicly. How does the team respond?",

"Commitment: Leadership wants a final decision. What happens?",

"Results: Performance metrics are declining. What becomes the priority?",

"Conflict: Resource allocation becomes a major issue. What happens?",

"Accountability: One member repeatedly misses expectations. What happens?",

"Results: Team goals and personal goals begin to diverge. What happens?",

"Trust: Feedback is requested from peers. How is it received?",

"Commitment: An unpopular but necessary change is proposed. What happens?",

"Results: Final project outcomes are reviewed. What matters most?"

];

function startSimulation(){

const assignedArc =
assignArc();

console.log(
"Assigned Arc:",
assignedArc
);

document.getElementById("simulation")
.classList.remove("hidden");

loadQuestion();

}

function loadQuestion(){

document.getElementById("questionTitle")
.innerText=
"Question "+(currentQuestion+1);

document.getElementById("questionText")
.innerText=
questions[currentQuestion];

document.getElementById("tracker")
.innerText=
currentQuestion+1;

document.getElementById("progressBar")
.style.width=
((currentQuestion+1)/15*100)+"%";

}

function answer(type){

currentQuestion++;

if(currentQuestion>=15){

alert("Assessment Completed. PDF Report Generation will be added next.");

return;

}

loadQuestion();

}

</script>

</body>

</html>
