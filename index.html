<!DOCTYPE html>
<html>

<head>

<title>HRTechify Team Simulator</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="max-w-6xl mx-auto p-6">

<div class="text-center mb-8">

<h1 class="text-5xl font-bold">
HRTechify Team Simulator
</h1>

<p class="text-slate-300 mt-3">
Leadership & Team Effectiveness Assessment
</p>

</div>

<div id="landingPage">

<div class="hero-card p-4 mb-8 max-w-5xl mx-auto">

<img
id="carousel"
class="carousel-image"
src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=1200">

</div>

<div class="hero-card p-8 max-w-4xl mx-auto">

<h2 class="text-2xl font-bold mb-6">
Participant Information
</h2>

<label class="block mb-2 font-semibold">
Full Name *
</label>

<input
id="name"
placeholder="Example: John Smith"
class="border p-3 rounded w-full mb-4 text-black">

<p class="text-sm text-slate-300 mb-4">
Please enter first name and last name.
</p>

<select
id="jobFunction"
onchange="populateFamilies()"
class="border p-3 rounded w-full mb-4 text-black">

<option value="">
Select Job Function
</option>

</select>

<select
id="jobFamily"
class="border p-3 rounded w-full text-black">

<option value="">
Select Job Family
</option>

</select>

<button
onclick="startSimulation()"
class="bg-blue-600 text-white px-6 py-3 rounded-lg mt-6">

Begin Assessment

</button>

</div>

</div>

<div
id="storyTiles"
class="hidden mb-6">

<div class="grid grid-cols-5 gap-2">

<div class="story-tile">1</div>
<div class="story-tile">2</div>
<div class="story-tile">3</div>
<div class="story-tile">4</div>
<div class="story-tile">5</div>

<div class="story-tile">6</div>
<div class="story-tile">7</div>
<div class="story-tile">8</div>
<div class="story-tile">9</div>
<div class="story-tile">10</div>

<div class="story-tile">11</div>
<div class="story-tile">12</div>
<div class="story-tile">13</div>
<div class="story-tile">14</div>
<div class="story-tile">15</div>

</div>

</div>

<div
id="simulation"
class="hidden hero-card p-10 mt-6">

<h2
id="questionTitle"
class="text-3xl font-bold mb-4">
</h2>

<p
id="questionText"
class="text-lg mb-6">
</p>

<div
id="options"
class="grid gap-4 mt-6">
</div>

</div>

</div>

<footer
class="fixed bottom-0 left-0 right-0 bg-black text-white text-center p-3">

Scenario <span id="tracker">0</span>/15

</footer>

<script src="data/job-functions.js"></script>
<script src="js/app.js"></script>

</body>
</html>
